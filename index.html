<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12A1 - 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f8e1ec,#fbeaf1,#fff5f8);
font-family:'Be Vietnam Pro',sans-serif;
overflow:hidden;
transition:background 2s ease;
}

/* ✨ HẠT SÁNG */
.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.3;
animation:twinkle 4s infinite alternate;
}
@keyframes twinkle{
from{opacity:.1;}
to{opacity:.5;}
}

/* 🌸 CÁNH HOA */
.petal{
position:absolute;
width:16px;
height:16px;
background:linear-gradient(45deg,#ffc0da,#ffd6e8);
border-radius:50% 50% 50% 0;
opacity:.4;
animation:fall linear infinite;
}
@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* 💌 PHONG THƯ LỚN */
.envelope{
position:relative;
width:480px;
height:280px;
background:linear-gradient(135deg,#f7cadb,#f3b6cf);
border-radius:20px;
box-shadow:0 30px 80px rgba(0,0,0,0.15);
cursor:pointer;
transition:transform .5s ease;
}

.envelope:hover{
transform:scale(1.03);
}

.flap{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(135deg,#f2a7c6,#e995b9);
clip-path:polygon(0 0,100% 0,50% 70%);
transform-origin:top;
transition:transform 1s ease;
border-radius:20px;
}

/* 💗 THIỆP BÊN TRONG */
.letter{
position:absolute;
width:92%;
height:420px;
background:linear-gradient(180deg,#fffafc,#ffeef5);
top:30px;
left:4%;
border-radius:20px;
padding:35px;
box-shadow:0 25px 60px rgba(0,0,0,0.15);
transform:translateY(200px);
opacity:0;
transition:all 1.6s ease;
text-align:center;
}

/* 🌟 ÁNH SÁNG QUÉT */
.light{
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
transform:skewX(-25deg);
}

/* 📝 CHỮ */
.message{
font-family:'Playfair Display',serif;
font-size:20px;
color:#6d3a4f;
line-height:1.8;
opacity:0;
transition:opacity 2s ease;
}

/* 📸 ẢNH */
.letter img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
margin-top:20px;
opacity:0;
transition:opacity 2s ease, transform 8s ease;
}

/* OPEN */
.open .flap{
transform:rotateX(180deg);
}
.open .letter{
transform:translateY(-180px);
opacity:1;
}
.open .message{
opacity:1;
}
.open .letter img{
opacity:1;
transform:scale(1.08);
}

/* 🎵 NÚT NHẠC */
.music-btn{
position:fixed;
bottom:25px;
right:25px;
background:white;
border:none;
border-radius:50%;
width:55px;
height:55px;
font-size:20px;
cursor:pointer;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
<div class="flap"></div>

<div class="letter">
<div class="message">
🌸 <b>Gửi những bông hoa rực rỡ của 12A1 💖</b> 🌸<br><br>
Cảm ơn vì đã làm thanh xuân này dịu dàng hơn ✨<br>
Chúc 8/3 thật hạnh phúc và ngập tràn yêu thương 💐
</div>

<div class="light"></div>

<img src="lop12a1.jpg" alt="12A1">
</div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="bgMusic">
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946e0bbdc9.mp3?filename=romantic-piano-121756.mp3" type="audio/mp3">
</audio>

<script>

/* sparkle */
for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(s);
}

/* petals */
for(let i=0;i<18;i++){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(12+Math.random()*8)+"s";
document.body.appendChild(p);
}

let musicStarted=false;

function openLetter(){
document.querySelector(".envelope").classList.add("open");

const music=document.getElementById("bgMusic");
if(!musicStarted){
music.volume=0;
music.play();
musicStarted=true;

/* fade in piano */
let fade=setInterval(()=>{
if(music.volume<0.35){
music.volume+=0.02;
}else{
clearInterval(fade);
}
},200);
}

/* ánh sáng quét */
document.querySelector(".light").animate(
[{left:"-100%"},{left:"150%"}],
{duration:2000,fill:"forwards"}
);
}

function toggleMusic(){
const music=document.getElementById("bgMusic");
if(music.paused){
music.play();
}else{
music.pause();
}
}

</script>

</body>
</html>
