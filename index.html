<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/3 💐</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    overflow:hidden;
}

.container{
    position:relative;
    z-index:2;
    margin-top:80px;
    color:white;
}

h1{
    font-size:45px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white;}
    to{ text-shadow:0 0 25px #ff4da6;}
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    margin:10px;
    cursor:pointer;
    background:white;
    color:#ff4da6;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff4da6;
    color:white;
}

.message{
    display:none;
    margin-top:20px;
    font-size:20px;
    background:rgba(255,255,255,0.2);
    padding:15px;
    border-radius:15px;
}

/* Hoa rơi */
.flower{
    position:absolute;
    top:-50px;
    font-size:25px;
    animation: fall linear infinite;
}

@keyframes fall{
    to{
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🌸 Chúc Mừng 8/3 🌸</h1>
    <p>Chúc bạn luôn xinh đẹp, hạnh phúc và thành công!</p>

    <button onclick="showMessage()">💌 Mở Thư</button>
    <button onclick="toggleMusic()">🎵 Bật/Tắt Nhạc</button>

    <div class="message" id="secretMessage">
        Cảm ơn bạn đã luôn tuyệt vời 💖  
        Mong rằng ngày nào của bạn cũng rực rỡ như hoa 🌷
    </div>
</div>

<!-- Nhạc nền -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
// Hiện thư
function showMessage(){
    const msg = document.getElementById("secretMessage");
    msg.style.display = "block";
}

// Bật tắt nhạc
function toggleMusic(){
    const music = document.getElementById("music");
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

// Tạo hoa rơi
function createFlower(){
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * window.innerWidth + "px";
    flower.style.animationDuration = (Math.random()*3 + 2) + "s";
    document.body.appendChild(flower);

    setTimeout(()=>{
        flower.remove();
    },5000);
}

setInterval(createFlower,300);
</script>

</body>
</html>
