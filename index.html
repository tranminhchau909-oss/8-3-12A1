<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/3 - 12A1</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:linear-gradient(135deg,#1a1a1a,#2a1f2f,#f7c5d9);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    transition:background 2s ease;
}

/* Hạt sáng nhẹ */
.sparkle{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:.4;
    animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
    from{opacity:.1;}
    to{opacity:.6;}
}

/* PHONG THƯ */
.envelope{
    position:relative;
    width:320px;
    height:200px;
    background:#f8d7e6;
    border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:all 1.2s ease;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#f4bcd4;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:transform 1.2s ease;
    border-radius:8px;
}

/* LÁ THƯ */
.letter{
    position:absolute;
    width:90%;
    height:260px;
    background:#fffafc;
    top:20px;
    left:5%;
    border-radius:8px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    transform:translateY(120px);
    opacity:0;
    transition:all 1.5s ease;
    text-align:center;
}

.letter img{
    width:100%;
    border-radius:6px;
    margin-top:15px;
    opacity:0;
    transition:opacity 2s ease, transform 8s ease;
}

/* ánh sáng quét */
.light-scan{
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
    transform:skewX(-20deg);
}

.message{
    margin-top:10px;
    font-family:'Playfair Display',serif;
    font-size:18px;
    line-height:1.6;
    opacity:0;
    transition:opacity 2s ease;
}

/* Cánh hoa */
.petal{
    position:absolute;
    width:15px;
    height:15px;
    background:pink;
    border-radius:50% 50% 50% 0;
    opacity:.5;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-50px) rotate(0deg);}
    100%{transform:translateY(110vh) rotate(360deg);}
}

/* Khi mở */
.open .flap{
    transform:rotateX(180deg);
}
.open .letter{
    transform:translateY(-100px);
    opacity:1;
}
.open .letter img{
    opacity:1;
    transform:scale(1.08);
}
.open .message{
    opacity:1;
}
</style>
</head>

<body>

<!-- Hạt sáng -->
<script>
for(let i=0;i<30;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(s);
}
</script>

<!-- Cánh hoa -->
<script>
for(let i=0;i<15;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(8+Math.random()*6)+"s";
    document.body.appendChild(p);
}
</script>

<div class="envelope" onclick="openLetter()">
    <div class="flap"></div>
    <div class="letter">
        <div class="message">
            🌷 Lời chúc 8/3 gửi đến những bông hoa rực rỡ của 12A1 🌷<br><br>
            Cảm ơn các bạn đã làm thanh xuân này dịu dàng và đáng nhớ hơn.
        </div>
        <div class="light-scan"></div>
        <img src="lop12a1.jpg" alt="12A1">
    </div>
</div>

<audio id="openSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9f8d14d66c.mp3?filename=paper-rustle-1-16608.mp3"></audio>

<script>
function openLetter(){
    document.querySelector(".envelope").classList.add("open");
    document.body.style.background="linear-gradient(135deg,#ffd6e8,#f7c5d9,#fff0f5)";
    document.getElementById("openSound").volume=0.2;
    document.getElementById("openSound").play();

    // ánh sáng quét
    const scan=document.querySelector(".light-scan");
    scan.style.animation="scanMove 2s forwards";
}

</script>

<style>
@keyframes scanMove{
    from{left:-100%;}
    to{left:150%;}
}
</style>

</body>
</html>
