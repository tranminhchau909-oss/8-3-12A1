<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background: radial-gradient(circle at center, #1a1a1a, #000);
overflow:hidden;
font-family:'Playfair Display',serif;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

/* GOLD GLOW */
.gold-text{
background: linear-gradient(45deg,#f6d365,#fda085,#fbc2eb,#f6d365);
-webkit-background-clip:text;
color:transparent;
background-size:300% 300%;
animation: goldFlow 5s ease infinite;
}

@keyframes goldFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CARD CONTAINER */
.card-container{
perspective:2000px;
}

.card{
width:500px;
height:600px;
position:relative;
transform-style:preserve-3d;
transition:1.5s;
cursor:pointer;
}

.card.open{
transform:rotateY(180deg);
}

.front,.inside{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
box-shadow:0 0 50px rgba(255,215,0,0.5);
overflow:hidden;
}

.front{
background:linear-gradient(135deg,#111,#1f1f1f);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
border:2px solid gold;
}

.front h1{
font-family:'Great Vibes',cursive;
font-size:60px;
}

.front p{
margin-top:20px;
font-size:18px;
letter-spacing:2px;
}

.inside{
background:linear-gradient(135deg,#000,#222);
transform:rotateY(180deg);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
border:2px solid gold;
}

.inside h2{
font-size:28px;
line-height:1.8;
}

/* FLOATING 3D FLOWERS */
.flower{
position:absolute;
font-size:28px;
animation:floatFlower linear infinite;
filter:drop-shadow(0 0 10px pink);
}

@keyframes floatFlower{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-10vh) rotate(360deg);}
}

/* FIREWORK CANVAS */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

/* VIGNETTE EFFECT */
body::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,transparent 60%,rgba(0,0,0,0.8));
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card-container">
<div class="card" onclick="openCard()">
<div class="front">
<h1 class="gold-text">Happy 8/3</h1>
<p>Nhấn để mở thiệp</p>
</div>
<div class="inside">
<h2 class="gold-text">
Chúc các chị em<br>
luôn xinh đẹp, hạnh phúc<br>
và rực rỡ như pháo hoa ✨
</h2>
</div>
</div>
</div>

<audio id="music" autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6b6f1f6db3.mp3">
</audio>

<script>
function openCard(){
document.querySelector('.card').classList.toggle('open');
launchFireworks();
}

/* FLOWERS */
for(let i=0;i<40;i++){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(5+Math.random()*5)+"s";
flower.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(flower);
}

/* FIREWORKS SYSTEM */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function launchFireworks(){
for(let i=0;i<10;i++){
setTimeout(createExplosion,i*400);
}
}

function createExplosion(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;
for(let i=0;i<80;i++){
particles.push({
x:x,
y:y,
radius:2,
color:`hsl(${Math.random()*360},100%,60%)`,
angle:Math.random()*2*Math.PI,
speed:Math.random()*6+2,
life:100
});
}
}

function animate(){
requestAnimationFrame(animate);
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
if(p.life<=0)particles.splice(i,1);
});
}

animate();
</script>

</body>
</html>
