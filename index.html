<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp 8/3 12A1</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#f9d5e5,#f6c1d9,#fbe4ef);
  overflow:hidden;
  font-family:'Quicksand',sans-serif;
}

/* Envelope */
.envelope{
  width:420px;
  height:300px;
  position:relative;
  cursor:pointer;
  transition:0.6s;
}

.envelope-body{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#f7c8dd,#f4b6d2);
  border-radius:20px;
  box-shadow:0 25px 40px rgba(0,0,0,0.15);
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#f2a7c7;
  clip-path:polygon(0 0,100% 0,50% 60%);
  border-radius:20px;
  transform-origin:top;
  transition:0.8s ease;
}

/* Card */
.card{
  position:absolute;
  width:360px;
  height:460px;
  background:white;
  border-radius:25px;
  top:40px;
  left:30px;
  padding:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  transform:translateY(150px) scale(0.8);
  opacity:0;
  transition:1s ease;
  text-align:center;
}

.card h2{
  font-family:'Playfair Display',serif;
  color:#c46b8c;
}

.card p{
  color:#6b4b59;
  font-size:18px;
  line-height:1.6;
}

.card img{
  width:100%;
  border-radius:15px;
  margin-top:15px;
  animation:zoom 6s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.05);}
}

/* Shine effect */
.shine{
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
  animation:shineMove 5s infinite;
}

@keyframes shineMove{
  0%{left:-100%;}
  100%{left:100%;}
}

/* Open state */
.envelope.open .flap{
  transform:rotateX(180deg);
}

.envelope.open .card{
  transform:translateY(-180px) scale(1);
  opacity:1;
}

/* Petals */
.petal{
  position:absolute;
  width:12px;
  height:12px;
  background:#f7a8c4;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-50px) rotate(0);}
  100%{transform:translateY(110vh) rotate(360deg);}
}

.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#f4b6d2;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="envelope" onclick="openCard()">
  <div class="flap"></div>
  <div class="envelope-body"></div>
  <div class="card">
      <div class="shine"></div>
      <h2>🌸 Lời chúc 8/3 gửi 12A1 🌸</h2>
      <p>
      Cảm ơn những bông hoa rực rỡ của lớp đã làm thanh xuân này
      dịu dàng và đáng nhớ hơn rất nhiều 💗
      </p>
      <!-- THAY LINK ẢNH LỚP Ở ĐÂY -->
      <img src="https://picsum.photos/400/300" alt="Ảnh lớp">
  </div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎹 Bật / Tắt nhạc</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-piano-110997.mp3" type="audio/mp3">
</audio>

<script>
function openCard(){
  document.querySelector('.envelope').classList.toggle('open');
}

function toggleMusic(){
  const music = document.getElementById("music");
  if(music.paused){
    music.play();
  }else{
    music.pause();
  }
}

/* Create petals */
for(let i=0;i<20;i++){
  let petal=document.createElement("div");
  petal.className="petal";
  petal.style.left=Math.random()*100+"vw";
  petal.style.animationDuration=(5+Math.random()*5)+"s";
  petal.style.opacity=Math.random();
  document.body.appendChild(petal);
}
</script>

</body>
</html>
