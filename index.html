
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp 8/3 - 12A1</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:linear-gradient(135deg,#1a1a1a,#2a1f2f);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Be Vietnam Pro',sans-serif;
    overflow:hidden;
    transition:background 2s ease;
}

/* PHONG THƯ */
.envelope{
    position:relative;
    width:360px;
    height:220px;
    background:#f8c8dc;
    border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    cursor:pointer;
    transition:transform 0.6s ease;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#f3a9c8;
    clip-path:polygon(0 0,100% 0,50% 65%);
    transform-origin:top;
    transition:transform 1s ease;
    border-radius:12px;
}

/* LÁ THƯ */
.letter{
    position:absolute;
    width:92%;
    height:320px;
    background:#fff0f5;
    top:25px;
    left:4%;
    border-radius:12px;
    padding:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    transform:translateY(160px);
    opacity:0;
    transition:all 1.5s ease;
    text-align:center;
}

.message{
    font-family:'Playfair Display',serif;
    font-size:18px;
    line-height:1.6;
    color:#5a2a3a;
    opacity:0;
    transition:opacity 2s ease;
}

.letter img{
    width:100%;
    border-radius:10px;
    margin-top:15px;
    opacity:0;
    transition:opacity 2s ease, transform 6s ease;
}

/* OPEN */
.open .flap{
    transform:rotateX(180deg);
}
.open .letter{
    transform:translateY(-130px);
    opacity:1;
}
.open .message{
    opacity:1;
}
.open .letter img{
    opacity:1;
    transform:scale(1.07);
}

/* NÚT NHẠC */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ffffffdd;
    border:none;
    border-radius:50%;
    width:48px;
    height:48px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
    <div class="flap"></div>
    <div class="letter">
        <div class="message">
            🌷 Lời chúc 8/3 gửi đến những bông hoa rực rỡ của 12A1 🌷<br><br>
            Cảm ơn các bạn đã làm thanh xuân này dịu dàng và đáng nhớ hơn.
        </div>
        <img src="lop12a1.jpg" alt="12A1">
    </div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="bgMusic">
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946e0bbdc9.mp3?filename=romantic-piano-121756.mp3" type="audio/mp3">
</audio>

<script>
let musicStarted=false;

function openLetter(){
    document.querySelector(".envelope").classList.add("open");

    // ĐỔI NỀN RÕ HỒNG
    document.body.style.background=
    "linear-gradient(135deg,#ffb6d9,#ffcce6,#ffe6f2)";

    // PHÁT NHẠC (trình duyệt cho phép vì click)
    const music=document.getElementById("bgMusic");
    if(!musicStarted){
        music.volume=0.3;
        music.play();
        musicStarted=true;
    }
}

function toggleMusic(){
    const music=document.getElementById("bgMusic");
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}
</script>

</body>
</html>
